<!doctype html>
<html><head><meta charset="utf-8"><title>ASCII drop player</title>
<style>
  html, body { margin:0; height:100%; background:#000; font-family:monospace; overflow:hidden; }
  #screen { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); margin:0; white-space:pre; line-height:1; }
  #bar { position:fixed; top:0; left:0; right:0; display:flex; gap:8px; padding:12px; background:#000; z-index:1; }
  #bar input[type=text] { flex:1; font-family:monospace; font-size:14px; background:#111; color:#fff; border:1px solid #333; padding:6px 8px; }
  #bar button { font-family:monospace; font-size:14px; padding:6px 12px; }
  #status { position:fixed; top:56px; left:12px; color:#888; font-size:13px; z-index:1; }
  #fps { position:fixed; bottom:8px; left:12px; color:#0f0; font-family:monospace; font-size:13px; z-index:1; cursor:pointer; }
  #config { position:fixed; top:56px; right:12px; z-index:1; background:#111; border:1px solid #333; padding:10px 12px; display:flex; flex-direction:column; gap:8px; }
  .ctrl { display:flex; align-items:center; gap:8px; color:#aaa; font-size:12px; }
  .ctrl label { width:80px; }
  .ctrl input[type=range] { flex:1; }
  .ctrl span { width:38px; text-align:right; color:#888; }
  .ctrl button { font-size:11px; padding:2px 6px; }
</style></head>
<body>
<pre id="screen"></pre>
<div id="bar">
  <input id="url" type="text" placeholder="paste a YouTube link and hit Load">
  <button id="load">Load</button>
</div>
<div id="status"></div>
<div id="fps"></div>
<div id="config"></div>
<canvas id="sample" style="display:none"></canvas>
<video id="video" style="display:none" loop playsinline></video>
<script>
const RAMP = " .:-=+*#%@";
const CHAR_ASPECT = 0.55; // monospace cell width:height compensation
const video = document.getElementById("video");
const screen = document.getElementById("screen");
const status = document.getElementById("status");
const canvas = document.getElementById("sample");
const bar = document.getElementById("bar");
const fpsEl = document.getElementById("fps");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
let cols = 0, rows = 0;

const CONTROLS = {
  detail: { label: "detail", min: 1, max: 8, step: 1, default: 6, unit: "" },
  contrast: { label: "contrast", min: 0, max: 100, step: 1, default: 50, unit: "%" },
};
const state = {};
for (const key in CONTROLS) state[key] = CONTROLS[key].default;

const configEl = document.getElementById("config");
for (const key in CONTROLS) {
  const c = CONTROLS[key];
  const row = document.createElement("div");
  row.className = "ctrl";
  row.innerHTML = `
    <label>${c.label}</label>
    <input type="range" id="ctrl-${key}" min="${c.min}" max="${c.max}" step="${c.step}" value="${c.default}">
    <span id="val-${key}">${c.default}${c.unit}</span>
    <button data-key="${key}">reset</button>`;
  configEl.appendChild(row);
}

function setControl(key, value) {
  state[key] = value;
  document.getElementById(`ctrl-${key}`).value = value;
  document.getElementById(`val-${key}`).textContent = value + CONTROLS[key].unit;
  if (key === "detail") computeGrid();
}

for (const key in CONTROLS) {
  document.getElementById(`ctrl-${key}`).addEventListener("input", e => setControl(key, Number(e.target.value)));
}
configEl.addEventListener("click", e => {
  const key = e.target.dataset.key;
  if (key) setControl(key, CONTROLS[key].default);
});

function computeGrid() {
  if (!video.videoWidth) return;
  const fontPx = 22 - state.detail * 2; // detail 1 (chunky) .. 10 (fine) -> 20px .. 2px
  const barH = bar.offsetHeight; // top URL bar is fixed and opaque; keep the grid clear of it
  const availH = window.innerHeight - barH;
  const maxCols = Math.floor(window.innerWidth / (fontPx * 0.6));
  const maxRows = Math.floor(availH / fontPx);
  const videoRatio = (video.videoHeight / video.videoWidth) * CHAR_ASPECT;
  cols = maxCols;
  rows = Math.round(cols * videoRatio);
  if (rows > maxRows) {
    rows = maxRows;
    cols = Math.round(rows / videoRatio);
  }
  cols = Math.max(1, cols);
  rows = Math.max(1, rows);
  canvas.width = cols;
  canvas.height = rows;
  screen.style.fontSize = fontPx + "px";
  screen.style.top = (barH + availH / 2) + "px"; // center in the space below the bar, not the whole viewport
}

function onMetadata() { computeGrid(); }
window.addEventListener("resize", computeGrid);

const RAMP_LAST = RAMP.length - 1;
const RAMP_SCALE = RAMP.length / 255;
// Grayscale only, quantized to 16 gray levels. Each level is a CSS class (16 rules in one <style>),
// so a cell emits `<span class=h>` (~13B) instead of `<span style="color:#rrggbb">` (~28B): ~40%
// less markup AND the browser resolves 16 shared class styles instead of tens of thousands of inline
// ones. On high-detail (noisy) video ~1 span/cell is unavoidable, so shrinking the per-span cost and
// killing per-frame allocation is what tames the GC pauses that show up as huge random FPS drops.
// (Color removed: independent RGB = 16^3 colors, shatters run-merging -> 5-10x spans. See git history.)
const LEVELS = 16;
const QUANT_LEVEL = new Uint8Array(256); // luminance -> level index 0..LEVELS-1 (compare key + class index)
const LEVEL_CLASS = new Array(LEVELS);   // level index -> interned class-name string ("a".."p")
let quantCss = "";
for (let i = 0; i < LEVELS; i++) {
  const g = Math.round(i * 255 / (LEVELS - 1));
  const h = g.toString(16).padStart(2, "0");
  LEVEL_CLASS[i] = String.fromCharCode(97 + i);
  quantCss += `#screen .${LEVEL_CLASS[i]}{color:#${h}${h}${h}}`;
}
for (let v = 0; v < 256; v++) QUANT_LEVEL[v] = Math.round(v / 255 * (LEVELS - 1));
{ const st = document.createElement("style"); st.textContent = quantCss; document.head.appendChild(st); }
// contrast curve, rebuilt per frame (256 entries is nothing next to the pixel loop). Uint8Clamped rounds+clamps for free.
const CONTRAST_LUT = new Uint8ClampedArray(256);
// Reused across frames: pushing interned strings (literals, class names, cached single chars) means
// the whole markup build allocates ~nothing per frame — only the final join() + getImageData remain.
const PARTS = [];

let fpsCount = 0, fpsLast = 0, drawMs = 0, buildMs = 0, domMs = 0;
let lastVt = 0; // last video frame time, to detect loop wrap (decode stall on wrap is not a render cost)
let lastPresented = 0, presentedAtWindow = 0; // rVFC frame counter: how many frames the VIDEO actually showed vs how many we rendered
const MIN_FRAME_MS = 1000 / 60 - 4; // cap render at ~60fps (with jitter tolerance) — skip extra frames from 60/120fps video
let lastRender = -1e9;
// Render once per PRESENTED VIDEO FRAME, not per display refresh: a 30fps video on a 60/120Hz screen
// was rebuilt 2-4x per frame for identical output. requestVideoFrameCallback fires exactly per new
// frame -> halves+ the build/dom/getImageData work and the GC that rides on it. Re-registers itself
// (always, even when the work is skipped) so it self-heals across pause/resume. rAF is the fallback.
function scheduleFrame() {
  if (video.requestVideoFrameCallback) video.requestVideoFrameCallback(renderFrame);
  else requestAnimationFrame(renderFrame);
}
// Ranked list of the worst frames since load, worst -> best. Lives on window so it survives and can
// be dumped on demand: run `dumpWorst()` in the console, or read the "[WORST]" log line. Loop-wrap
// frames are excluded (decode stall, not render cost). Click #fps to reset the list.
const WORST_N = 20;
const worst = window.WORST = [];
function logWorst() {
  console.log("[WORST] top " + worst.length + " frames (worst→best):\n" + worst.map((w, i) =>
    `${String(i + 1).padStart(2)}. ${w.ms.toFixed(0).padStart(3)}ms  d${w.d.toFixed(1)} b${w.b.toFixed(1)} dom${w.dom.toFixed(1)}  ${w.grid} @${w.at}ms`).join("\n"));
}
window.dumpWorst = logWorst;
fpsEl.addEventListener("click", () => { worst.length = 0; console.log("[WORST] reset"); });
function renderFrame(now, metadata) {
  if (metadata) lastPresented = metadata.presentedFrames; // count video frames even on skipped renders, so "drop" stays honest
  if (!video.paused && !video.ended && rows && now - lastRender >= MIN_FRAME_MS) {
    lastRender = now;
    const tDraw = performance.now();
    ctx.drawImage(video, 0, 0, cols, rows);
    const data = ctx.getImageData(0, 0, cols, rows).data;
    const tBuild = performance.now();
    const contrastFactor = state.contrast / 50; // 50% = neutral (factor 1)
    const clut = CONTRAST_LUT;
    for (let v = 0; v < 256; v++) clut[v] = (v - 128) * contrastFactor + 128;

    const parts = PARTS;
    parts.length = 0; // reuse the backing array; keeps capacity, allocates nothing
    for (let r = 0; r < rows; r++) {
      let runLv = -1; // current run's gray level; -1 = none open yet (reset per row, spans never cross \n)
      let base = r * cols * 4;
      for (let c = 0; c < cols; c++, base += 4) {
        const gray = clut[data[base]] * 0.299 + clut[data[base + 1]] * 0.587 + clut[data[base + 2]] * 0.114;
        const lv = QUANT_LEVEL[gray | 0];
        if (lv !== runLv) {
          if (runLv !== -1) parts.push("</span>");
          parts.push("<span class=", LEVEL_CLASS[lv], ">");
          runLv = lv;
        }
        parts.push(RAMP[gray * RAMP_SCALE < RAMP_LAST ? (gray * RAMP_SCALE) | 0 : RAMP_LAST]);
      }
      parts.push("</span>");
      if (r < rows - 1) parts.push("\n");
    }
    const tDom = performance.now();
    screen.innerHTML = parts.join("");
    void screen.offsetHeight; // force layout so its cost lands in this measurement, not later
    const tEnd = performance.now();
    const d = tBuild - tDraw, b = tDom - tBuild, dom = tEnd - tDom, total = d + b + dom;
    const vt = metadata ? metadata.mediaTime : video.currentTime; // rVFC gives the exact frame time
    const looped = vt < lastVt; // wrapped to start -> decode stall, skip this frame
    lastVt = vt;
    drawMs += d; buildMs += b; domMs += dom;
    if (!looped && (worst.length < WORST_N || total > worst[worst.length - 1].ms)) {
      const record = total > (worst.length ? worst[0].ms : 0); // new all-time worst?
      worst.push({ ms: total, d, b, dom, grid: `${cols}×${rows}`, at: Math.round(now) });
      worst.sort((x, y) => y.ms - x.ms);
      if (worst.length > WORST_N) worst.length = WORST_N;
      if (record) logWorst(); // only on a new #1 (rare) — avoids console spam/jank; full list is on window.WORST, dumpWorst() anytime
    }
    fpsCount++;
    if (now - fpsLast >= 500) {
      const n = fpsCount, secs = (now - fpsLast) / 1000;
      const renderFps = Math.round(n / secs);
      // normalize to the video: rendered fps vs the video's own fps, and frames we couldn't keep up with
      let head = `${renderFps} fps`;
      if (lastPresented) {
        const vFrames = lastPresented - presentedAtWindow;
        const dropped = Math.max(0, vFrames - n);
        head = `${renderFps}/${Math.round(vFrames / secs)} fps · ${dropped} drop`;
        presentedAtWindow = lastPresented;
      }
      const w = worst[0];
      fpsEl.textContent = `${head} · ${cols}×${rows} · `
        + `avg d${(drawMs / n).toFixed(1)} b${(buildMs / n).toFixed(1)} dom${(domMs / n).toFixed(1)} · `
        + (w ? `worst ${w.ms.toFixed(0)}ms (d${w.d.toFixed(0)} b${w.b.toFixed(0)} dom${w.dom.toFixed(0)}) ⟳` : "");
      fpsLast = now;
      fpsCount = drawMs = buildMs = domMs = 0;
    }
  }
  scheduleFrame(); // re-register unconditionally so the chain survives skipped/paused frames
}
scheduleFrame();

async function loadUrl(youtubeUrl) {
  if (!youtubeUrl) return;
  status.textContent = "downloading via yt-dlp...";
  const res = await fetch("/download?url=" + encodeURIComponent(youtubeUrl));
  const body = await res.json();
  if (!res.ok) {
    status.textContent = "error: " + body.error;
    return;
  }
  status.textContent = "";
  video.onloadedmetadata = onMetadata;
  video.src = "/current.mp4?t=" + Date.now();
  video.play();
}

document.getElementById("load").addEventListener("click", () => loadUrl(document.getElementById("url").value.trim()));
document.getElementById("url").addEventListener("keydown", e => { if (e.key === "Enter") loadUrl(e.target.value.trim()); });

document.addEventListener("keydown", e => {
  if (e.code !== "Space" || !video.src) return;
  e.preventDefault();
  video.paused ? video.play() : video.pause();
});
</script>
</body></html>
