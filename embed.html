<!doctype html>
<html><head><meta charset="utf-8"><title>asciify embed</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#08090a;
    --text:#e9eaed;
    --muted:#868b93;
    --faint:#43474e;
    --surface:rgba(20,21,24,0.72);
    --border:rgba(255,255,255,0.10);
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;font-family:var(--mono);color:var(--text);-webkit-font-smoothing:antialiased;}

  /* the ascii — the hero. Colour comes from the baked palette (buildPaletteCSS); flat colour set on #screen too. */
  #screen{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);margin:0;white-space:pre;line-height:1;color:#fff;}

  /* faint vignette so the ascii sits in a frame and edges don't feel raw. Never competes — pure black falloff. */
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:1;
    background:radial-gradient(ellipse 120% 120% at 50% 50%,transparent 58%,rgba(0,0,0,0.55) 100%);}

  /* unobtrusive corner mark — recessive, monochrome, gets out of the way of the art */
  #mark{position:fixed;right:9px;bottom:7px;z-index:1;pointer-events:none;
    font-size:10px;letter-spacing:.22em;color:var(--faint);opacity:.6;user-select:none;}

  /* loading — an animated ascii "scanner" wave in the same mono/monochrome language as the main app.
     A row of ramp glyphs with a bright band sweeping across via a clipped gradient (no JS, no assets). */
  #load{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;text-align:center;}
  #load .wave{font-size:24px;letter-spacing:.36em;padding-left:.36em;font-weight:400;
    background:linear-gradient(100deg,var(--faint) 20%,var(--text) 50%,var(--faint) 80%);
    background-size:220% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
    animation:sweep 1.5s linear infinite;}
  #load .cap{margin-top:16px;font-size:11px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;}
  @keyframes sweep{0%{background-position:140% 0;}100%{background-position:-40% 0;}}

  /* error — an intentional, on-brand card, not raw text */
  #err{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;display:none;
    flex-direction:column;align-items:center;gap:10px;padding:22px 26px;max-width:78vw;
    background:var(--surface);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--border);border-radius:13px;box-shadow:0 12px 40px rgba(0,0,0,0.55);text-align:center;}
  #err .glyph{font-size:22px;color:var(--faint);letter-spacing:.3em;padding-left:.3em;}
  #err .title{font-size:13px;letter-spacing:.02em;color:var(--text);}
  #err .sub{font-size:11px;letter-spacing:.02em;color:var(--muted);}

  /* tap-to-enable-sound — a single glassy play glyph over the (already animating) ascii. Shown only if
     unmuted autoplay is blocked. Not a full-screen wall; the art stays visible and moving behind it. */
  #tap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:4;display:none;
    flex-direction:column;align-items:center;gap:11px;cursor:pointer;}
  #tap:not([hidden]){display:flex;}
  #tap .disc{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:var(--surface);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,0.55);
    font-size:26px;color:var(--text);padding-left:5px;transition:transform .12s,border-color .15s,background .15s;}
  #tap:hover .disc{transform:scale(1.06);border-color:rgba(255,255,255,0.22);background:rgba(30,31,34,0.8);}
  #tap .lbl{font-size:11px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;}

  @media (prefers-reduced-motion:reduce){#load .wave{animation:none;background-position:50% 0;}}
</style></head>
<body>
<pre id="screen"></pre>
<div id="vignette"></div>
<div id="mark">asciify</div>
<div id="load"><div class="wave">.:-=+*#%@</div><div class="cap">loading</div></div>
<div id="err"><div class="glyph">·:·</div><div class="title">clip unavailable</div><div class="sub">this embed could not be loaded</div></div>
<div id="tap" hidden><div class="disc">&#9654;</div><div class="lbl">tap for sound</div></div>
<audio id="audio" hidden></audio>
<script type="module" src="/src/embed-page.ts"></script>
</body></html>
