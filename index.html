<!doctype html>
<html><head><meta charset="utf-8"><title>ascii · youtube in text</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#08090a;
    --surface:rgba(20,21,24,0.72);
    --border:rgba(255,255,255,0.10);
    --border-strong:rgba(255,255,255,0.20);
    --text:#e9eaed;
    --muted:#868b93;
    --faint:#43474e;
    --shadow:0 12px 40px rgba(0,0,0,0.55);
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);font-family:var(--mono);overflow:hidden;color:var(--text);}
  body{-webkit-font-smoothing:antialiased;}

  /* the ASCII art — the hero. Its colour is user-chosen (buildPalette); the chrome stays monochrome so
     it never competes. This is also the pre-JS fallback colour, and the flat colour when shading is off. */
  #screen{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);margin:0;white-space:pre;line-height:1;color:#fff;}

  /* command bar — a prompt to paste a link */
  #bar{position:fixed;top:18px;left:18px;z-index:2;display:flex;align-items:center;
       width:min(440px,calc(100vw - 36px));height:44px;padding:0 6px 0 14px;
       background:var(--surface);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
       border:1px solid var(--border);border-radius:11px;box-shadow:var(--shadow);}
  #bar .prompt{color:var(--faint);font-size:14px;margin-right:9px;user-select:none;}
  #bar input[type=text]{flex:1;min-width:0;font-family:var(--mono);font-size:13px;background:none;color:var(--text);border:none;outline:none;padding:0;height:100%;}
  #bar input[type=text]::placeholder{color:var(--muted);}
  #bar button{font-family:var(--mono);font-size:12px;letter-spacing:.02em;color:var(--text);background:rgba(255,255,255,0.06);
       border:1px solid var(--border);border-radius:7px;padding:7px 12px;margin-left:7px;cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s,transform .05s;}
  #bar button:hover{background:rgba(255,255,255,0.13);border-color:var(--border-strong);}
  #bar button:active{transform:translateY(1px);}
  #bar button#load{background:rgba(255,255,255,0.13);}
  #bar button#load:hover{background:rgba(255,255,255,0.2);}

  /* drag-over cue: a hairline frame + hint while a file is over the window */
  #drop{position:fixed;inset:10px;z-index:5;border:1px dashed var(--border-strong);border-radius:16px;
        display:none;align-items:center;justify-content:center;background:rgba(8,9,10,0.55);
        backdrop-filter:blur(2px);color:var(--text);font-size:14px;letter-spacing:.02em;pointer-events:none;}
  body.dragging #drop{display:flex;}

  /* error message — centered under the empty/loader stage so it reads with the middle, not a corner */
  #status{position:fixed;top:calc(50% + 58px);left:50%;transform:translateX(-50%);z-index:2;color:var(--muted);
       font-size:12.5px;text-align:center;max-width:min(460px,calc(100vw - 36px));}

  /* loading — an on-theme ascii "scanner" that travels through the char ramp while Apify downloads.
     Runs only during a youtube load (never during playback), so it costs the render loop nothing. */
  #loader{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1;text-align:center;pointer-events:none;display:none;}
  #loader .wave{color:var(--muted);font-size:24px;line-height:1;white-space:pre;margin-bottom:20px;}
  #loader .msg{color:var(--muted);font-size:13px;letter-spacing:.02em;}
  body.loading #loader{display:block;}
  body.loading #empty,body.playing #loader{display:none;}

  /* control panel — a quiet instrument. Sits directly under the input bar in the same top-left column
     (matched width) so the two read as one stack, not opposite corners. .ctrl uses display:contents so
     every row's cells share one grid. */
  #config{position:fixed;top:74px;left:18px;z-index:2;display:grid;grid-template-columns:auto 1fr auto auto;
       gap:12px 12px;align-items:center;width:min(440px,calc(100vw - 36px));padding:15px 16px;
       background:var(--surface);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
       border:1px solid var(--border);border-radius:13px;box-shadow:var(--shadow);}
  .ctrl{display:contents;}
  .ctrl label{font-size:11px;letter-spacing:.02em;color:var(--muted);white-space:nowrap;}
  .ctrl .val{font-size:11px;color:var(--text);text-align:right;font-variant-numeric:tabular-nums;min-width:36px;}
  .ctrl .reset{font-family:var(--mono);font-size:13px;line-height:1;color:var(--faint);background:none;border:none;cursor:pointer;padding:2px 0;transition:color .15s,transform .2s;}
  .ctrl .reset:hover{color:var(--text);transform:rotate(-90deg);}

  /* range slider */
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:16px;background:none;cursor:pointer;}
  input[type=range]::-webkit-slider-runnable-track{height:2px;border-radius:2px;background:var(--faint);}
  input[type=range]::-moz-range-track{height:2px;border-radius:2px;background:var(--faint);}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;margin-top:-5px;width:12px;height:12px;border-radius:50%;background:var(--text);transition:transform .1s;}
  input[type=range]::-moz-range-thumb{border:none;width:12px;height:12px;border-radius:50%;background:var(--text);}
  input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.18);}
  input[type=range]:focus-visible::-webkit-slider-thumb{box-shadow:0 0 0 4px rgba(255,255,255,0.16);}

  /* checkbox as a toggle switch */
  input[type=checkbox]{appearance:none;-webkit-appearance:none;position:relative;width:30px;height:17px;border-radius:9px;background:var(--faint);cursor:pointer;transition:background .15s;margin:0;justify-self:start;}
  input[type=checkbox]:checked{background:var(--text);}
  input[type=checkbox]::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:var(--bg);transition:transform .15s;}
  input[type=checkbox]:checked::after{transform:translateX(13px);}

  /* colour swatch */
  input[type=color]{appearance:none;-webkit-appearance:none;width:100%;height:20px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;padding:0;}
  input[type=color]::-webkit-color-swatch-wrapper{padding:2px;}
  input[type=color]::-webkit-color-swatch{border:none;border-radius:4px;}
  input[type=color]::-moz-color-swatch{border:none;border-radius:4px;}

  input[type=checkbox]:focus-visible,input[type=color]:focus-visible,#bar button:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(255,255,255,0.20);}

  /* dim debug status line — only shown when DEBUG is on */
  #fps{position:fixed;bottom:13px;left:16px;z-index:2;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.02em;cursor:pointer;display:none;}

  /* empty state — built from the renderer's own character ramp; hidden once a video plays */
  #empty{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1;text-align:center;pointer-events:none;}
  #empty .ramp{color:var(--faint);font-size:26px;letter-spacing:.42em;padding-left:.42em;margin-bottom:20px;}
  #empty .hint{color:var(--muted);font-size:13px;letter-spacing:.01em;}
  body.playing #empty{display:none;}

  /* generate-embed button (only while a video plays) + the snippet modal */
  #embed{position:fixed;bottom:16px;right:16px;z-index:3;display:none;font-family:var(--mono);font-size:12px;
       letter-spacing:.02em;color:var(--text);background:var(--surface);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
       border:1px solid var(--border);border-radius:9px;padding:9px 14px;cursor:pointer;box-shadow:var(--shadow);transition:background .15s,border-color .15s;}
  #embed:hover{background:rgba(255,255,255,0.13);border-color:var(--border-strong);}
  #embed:disabled{opacity:.6;cursor:default;}
  body.playing #embed{display:block;}
  #embedwrap{position:fixed;inset:0;z-index:6;align-items:center;justify-content:center;
       background:rgba(8,9,10,0.62);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);}
  #embedwrap:not([hidden]){display:flex;}
  #embedcard{width:min(560px,calc(100vw - 40px));background:var(--surface);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
       border:1px solid var(--border-strong);border-radius:14px;box-shadow:var(--shadow);padding:18px;}
  #embedcard .etitle{font-size:12px;color:var(--muted);letter-spacing:.03em;margin-bottom:10px;}
  #embedcode{width:100%;height:92px;resize:none;font-family:var(--mono);font-size:12px;line-height:1.5;color:var(--text);
       background:rgba(0,0,0,0.35);border:1px solid var(--border);border-radius:8px;padding:10px;outline:none;}
  #embedcard .erow{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}
  #embedcard .erow button{font-family:var(--mono);font-size:12px;color:var(--text);background:rgba(255,255,255,0.08);
       border:1px solid var(--border);border-radius:7px;padding:7px 14px;cursor:pointer;transition:background .15s;}
  #embedcard .erow button:hover{background:rgba(255,255,255,0.15);}
  #embedcard .erow #embedcopy{background:rgba(255,255,255,0.14);}

  @media (max-width:560px){
    #config{left:18px;right:18px;width:auto;}
    #bar{width:calc(100vw - 36px);}
    #fps{display:none !important;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}
</style></head>
<body>
<pre id="screen"></pre>
<div id="empty">
  <div class="ramp">.:-=+*#%@</div>
  <div class="hint">paste a link, or drop an mp4, to watch it in ascii</div>
</div>
<div id="bar">
  <span class="prompt">&gt;</span>
  <input id="url" type="text" placeholder="youtube.com/watch?v=..." spellcheck="false" autocomplete="off">
  <button id="load">load</button>
</div>
<div id="loader"><div class="wave"></div><div class="msg"></div></div>
<div id="status"></div>
<div id="drop">drop an mp4 to play it in ascii</div>
<div id="fps"></div>
<div id="config"></div>
<button id="embed">◱ generate embed</button>
<div id="embedwrap" hidden><div id="embedcard">
  <div class="etitle">embed code — paste into any site</div>
  <textarea id="embedcode" readonly spellcheck="false"></textarea>
  <div class="erow"><button id="embedcopy">copy</button><button id="embedclose">close</button></div>
</div></div>
<canvas id="sample" style="display:none"></canvas>
<video id="video" style="display:none" loop playsinline crossorigin="anonymous"></video>
<script src="/asciiv-codec.js"></script>
<script>
const RAMP = " .:-=+*#%@";
const CHAR_ASPECT = 0.55; // monospace cell width:height compensation
const video = document.getElementById("video");
const screen = document.getElementById("screen");
const status = document.getElementById("status");
const canvas = document.getElementById("sample");
const bar = document.getElementById("bar");
const fpsEl = document.getElementById("fps");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
let cols = 0, rows = 0;

// Debug mode, off by default. When off: the #fps profiler line is hidden, the "[WORST]" console logs
// are suppressed, and the per-frame forced-layout measurement is skipped. Toggle live by pressing "d"
// (outside the link box). Off is the shipped default; it's a dev/perf tool, not part of the experience.
let DEBUG = false;

// Baked-embed capture state: while `recording`, paint() pushes each frame's char-indices into recFrames.
let recording = false, recFrames = [], baking = false;

const CONTROLS = {
  detail: { label: "resolution", min: 1, max: 8, step: 1, default: 8, unit: "" },
  contrast: { label: "contrast", min: 0, max: 100, step: 1, default: 50, unit: "%" },
  brightness: { label: "brightness", min: 0, max: 100, step: 1, default: 50, unit: "%" },
  invert: { label: "invert", type: "checkbox", default: false },
  // shading on = per-cell <i> gray/tinted spans (the default look). Off = plain one-colour text via
  // textContent, which skips the span machinery (~20x cheaper dom, measured) for a locked framerate on
  // big grids / weak hardware. It's a checkbox; the fast "turbo" path is just shading turned off.
  shading: { label: "shading", type: "checkbox", default: true },
  // base display colour. Shade mode ramps each level black -> this colour (tinted depth); turbo mode
  // uses it flat. White (#ffffff) = the classic gray look. type:"color" -> renders an <input type=color>.
  color: { label: "colour", type: "color", default: "#ffffff" },
};
const state = {};
for (const key in CONTROLS) state[key] = CONTROLS[key].default;

const configEl = document.getElementById("config");
for (const key in CONTROLS) {
  const c = CONTROLS[key];
  const row = document.createElement("div");
  row.className = "ctrl";
  let input;
  if (c.type === "color") input = `<input type="color" id="ctrl-${key}" value="${c.default}">`;
  else if (c.type === "checkbox") input = `<input type="checkbox" id="ctrl-${key}" ${c.default ? "checked" : ""}>`;
  else input = `<input type="range" id="ctrl-${key}" min="${c.min}" max="${c.max}" step="${c.step}" value="${c.default}">`;
  // Always emit the value cell (empty for non-range controls) so every row's 4 cells line up in the
  // shared grid (.ctrl is display:contents). Reset is a subtle ↺ glyph.
  row.innerHTML = `
    <label>${c.label}</label>
    ${input}
    <span class="val" id="val-${key}">${c.type ? "" : c.default + c.unit}</span>
    <button class="reset" data-key="${key}" title="reset ${c.label}" aria-label="reset ${c.label}">↺</button>`;
  configEl.appendChild(row);
}

function setControl(key, value) {
  state[key] = value;
  const input = document.getElementById(`ctrl-${key}`);
  if (CONTROLS[key].type === "checkbox") input.checked = value; else input.value = value;
  if (!CONTROLS[key].type) document.getElementById(`val-${key}`).textContent = value + CONTROLS[key].unit; // only range controls show a value
  if (key === "detail") computeGrid();
  if (key === "color") buildPalette(value);
  // Re-sample the current frame at the new grid RIGHT NOW. The render loop is idle while the video is
  // paused, so without this a detail change would only swap the font size on the stale text — scaling
  // it, which looks like a zoom. Repainting resamples at the new resolution so paused (and mid-play)
  // adjustments preview live at a fixed on-screen size. No-op until a video frame exists.
  if (video.videoWidth && rows) paint();
}

for (const key in CONTROLS) {
  const c = CONTROLS[key];
  document.getElementById(`ctrl-${key}`).addEventListener("input", e =>
    setControl(key, c.type === "color" ? e.target.value : c.type === "checkbox" ? e.target.checked : Number(e.target.value)));
}
configEl.addEventListener("click", e => {
  const key = e.target.dataset.key;
  if (key) setControl(key, CONTROLS[key].default);
});

function computeGrid() {
  if (!video.videoWidth) return;
  const fontPx = 22 - state.detail * 2; // detail 1 (chunky) .. 10 (fine) -> 20px .. 2px
  const barH = bar.offsetHeight; // top URL bar is fixed and opaque; keep the grid clear of it
  const availH = window.innerHeight - barH;
  const maxCols = Math.floor(window.innerWidth / (fontPx * 0.6));
  const maxRows = Math.floor(availH / fontPx);
  const videoRatio = (video.videoHeight / video.videoWidth) * CHAR_ASPECT;
  cols = maxCols;
  rows = Math.round(cols * videoRatio);
  if (rows > maxRows) {
    rows = maxRows;
    cols = Math.round(rows / videoRatio);
  }
  cols = Math.max(1, cols);
  rows = Math.max(1, rows);
  canvas.width = cols;
  canvas.height = rows;
  screen.style.fontSize = fontPx + "px";
  screen.style.top = (barH + availH / 2) + "px"; // center in the space below the bar, not the whole viewport
}

function onMetadata() { computeGrid(); }
// Recompute the grid on a real window resize, but NOT on browser zoom (cmd +/-). Both fire a resize and
// both shrink/grow innerWidth in CSS px — but zoom ALSO changes devicePixelRatio, a genuine resize does
// not. So if dpr moved, it was a zoom: leave the resolution fixed and let the zoom just magnify the
// (crisp, DOM-text) output, instead of resampling to a new grid.
let lastDpr = window.devicePixelRatio;
window.addEventListener("resize", () => {
  if (window.devicePixelRatio !== lastDpr) { lastDpr = window.devicePixelRatio; return; }
  computeGrid();
});

const RAMP_LAST = RAMP.length - 1;
const RAMP_SCALE = RAMP.length / 255;
// Quantized to LEVELS levels. Each level is a CSS class (one rule each in one <style>), and cells emit
// `<i class=h>` (~11B) instead of `<span style="color:#rrggbb">` (~28B): the shortest element tag +
// shared class styles mean far less markup AND the browser resolves a handful of class styles instead of
// tens of thousands of inline ones. Fewer levels -> adjacent cells share a level more often -> runs merge
// -> fewer spans -> less markup + less per-frame allocation, which is what tames the GC pauses that show
// up as huge random FPS drops. 8 is the sweet spot: dropping from 16 roughly halves the span count with
// banding still hidden by the char ramp. (turbo mode skips spans entirely; <i> is forced upright below.
// Per-cell RGB from the video was removed — 16^3 colours shatter run-merging, git history — but ONE base
// colour is cheap: the levels just ramp black -> that colour, so it stays <= LEVELS distinct colours.)
const LEVELS = 8;
const QUANT_LEVEL = new Uint8Array(256); // luminance -> level index 0..LEVELS-1 (compare key + class index)
const LEVEL_CLASS = new Array(LEVELS);   // level index -> interned class-name string ("a".."h")
for (let i = 0; i < LEVELS; i++) LEVEL_CLASS[i] = String.fromCharCode(97 + i);
for (let v = 0; v < 256; v++) QUANT_LEVEL[v] = Math.round(v / 255 * (LEVELS - 1));

// One <style> holding the per-level colours; rebuilt whenever the base colour changes. Level i ramps
// from black (i=0) to the base colour (i=LEVELS-1), so luminance depth is kept but tinted. Base white
// reproduces the classic black->white gray ramp exactly. Also sets #screen's flat colour for turbo mode.
const quantStyle = document.head.appendChild(document.createElement("style"));
function buildPalette(color) {
  const r = parseInt(color.slice(1, 3), 16), g = parseInt(color.slice(3, 5), 16), b = parseInt(color.slice(5, 7), 16);
  let css = "#screen i{font-style:normal}"; // <i> defaults to italic; keep the glyphs upright
  for (let i = 0; i < LEVELS; i++) {
    const f = i / (LEVELS - 1);
    const hex = [r, g, b].map(x => Math.round(x * f).toString(16).padStart(2, "0")).join("");
    css += `#screen .${LEVEL_CLASS[i]}{color:#${hex}}`;
  }
  quantStyle.textContent = css;
  screen.style.color = color; // turbo mode's flat text colour
}
buildPalette(state.color);
// contrast curve, rebuilt per frame (256 entries is nothing next to the pixel loop). Uint8Clamped rounds+clamps for free.
const CONTRAST_LUT = new Uint8ClampedArray(256);
// Reused across frames: pushing interned strings (literals, class names, cached single chars) means
// the whole markup build allocates ~nothing per frame — only the final join() + getImageData remain.
const PARTS = [];

let fpsCount = 0, fpsLast = 0, drawMs = 0, buildMs = 0, domMs = 0;
let lastVt = 0; // last video frame time, to detect loop wrap (decode stall on wrap is not a render cost)
let lastPresented = 0, presentedAtWindow = 0; // rVFC frame counter: how many frames the VIDEO actually showed vs how many we rendered
const MIN_FRAME_MS = 1000 / 60 - 4; // cap render at ~60fps (with jitter tolerance) — skip extra frames from 60/120fps video
let lastRender = -1e9;
// Render once per PRESENTED VIDEO FRAME, not per display refresh: a 30fps video on a 60/120Hz screen
// was rebuilt 2-4x per frame for identical output. requestVideoFrameCallback fires exactly per new
// frame -> halves+ the build/dom/getImageData work and the GC that rides on it. Re-registers itself
// (always, even when the work is skipped) so it self-heals across pause/resume. rAF is the fallback.
function scheduleFrame() {
  if (video.requestVideoFrameCallback) video.requestVideoFrameCallback(renderFrame);
  else requestAnimationFrame(renderFrame);
}
// Ranked list of the worst frames since load, worst -> best. Lives on window so it survives and can
// be dumped on demand: run `dumpWorst()` in the console, or read the "[WORST]" log line. Loop-wrap
// frames are excluded (decode stall, not render cost). Click #fps to reset the list.
const WORST_N = 20;
const worst = window.WORST = [];
function logWorst() {
  console.log("[WORST] top " + worst.length + " frames (worst→best):\n" + worst.map((w, i) =>
    `${String(i + 1).padStart(2)}. ${w.ms.toFixed(0).padStart(3)}ms  d${w.d.toFixed(1)} b${w.b.toFixed(1)} dom${w.dom.toFixed(1)}  ${w.grid} @${w.at}ms`).join("\n"));
}
window.dumpWorst = logWorst;
fpsEl.addEventListener("click", () => { worst.length = 0; console.log("[WORST] reset"); });
// Sample the current video frame and rebuild the ASCII at the CURRENT cols/rows. Split out of the loop
// so a control change can re-render on demand (see setControl) — the loop is the only *other* caller.
// Returns the per-phase timings so the loop can profile; callers that just want a refresh ignore them.
function paint() {
  const tDraw = performance.now();
  ctx.drawImage(video, 0, 0, cols, rows);
  const data = ctx.getImageData(0, 0, cols, rows).data;
  const tBuild = performance.now();
  const contrastFactor = state.contrast / 50; // 50% = neutral (factor 1)
  const brightOffset = (state.brightness - 50) * 2.55; // 50% = neutral (0); ±50 steps -> ~±128 offset
  // Contrast, invert and brightness all fold into the same per-frame 256-entry LUT (Uint8Clamped clamps
  // for us), so they cost nothing per pixel — applied before quantization, they shift the whole luminance
  // -> which gray level / char each cell lands on. ORDER MATTERS: contrast (scale around 128), THEN invert
  // (255 - value, a photo negative, dark<->light), THEN brightness (additive). Brightness is added last so
  // it still brightens the *displayed* image whether or not invert is on — folding it in before the invert
  // would reverse the slider. (Clamp the contrast result before inverting so brightness lands correctly.)
  const invert = state.invert;
  const clut = CONTRAST_LUT;
  for (let v = 0; v < 256; v++) {
    let x = (v - 128) * contrastFactor + 128;
    if (invert) x = 255 - (x < 0 ? 0 : x > 255 ? 255 : x);
    clut[v] = x + brightOffset;
  }

  const parts = PARTS;
  parts.length = 0; // reuse the backing array; keeps capacity, allocates nothing
  const shade = state.shading; // per-cell tinted spans vs plain one-colour text
  const rec = recording ? new Uint8Array(cols * rows) : null; // capture char-indices while baking an embed
  for (let r = 0; r < rows; r++) {
    let runLv = -1; // current run's gray level; -1 = none open yet (reset per row, spans never cross \n)
    let base = r * cols * 4;
    for (let c = 0; c < cols; c++, base += 4) {
      const gray = clut[data[base]] * 0.299 + clut[data[base + 1]] * 0.587 + clut[data[base + 2]] * 0.114;
      if (shade) {
        const lv = QUANT_LEVEL[gray | 0];
        if (lv !== runLv) {
          if (runLv !== -1) parts.push("</i>");
          parts.push("<i class=", LEVEL_CLASS[lv], ">");
          runLv = lv;
        }
      }
      const ci = gray * RAMP_SCALE < RAMP_LAST ? (gray * RAMP_SCALE) | 0 : RAMP_LAST;
      parts.push(RAMP[ci]);
      if (rec) rec[r * cols + c] = ci;
    }
    if (shade) parts.push("</i>");
    if (r < rows - 1) parts.push("\n");
  }
  if (rec) recFrames.push(rec); // one baked frame (matches exactly what's on screen this frame)
  const tDom = performance.now();
  // textContent skips the HTML parse + per-cell element create/destroy entirely (~20x cheaper).
  if (shade) screen.innerHTML = parts.join("");
  else screen.textContent = parts.join("");
  if (DEBUG) void screen.offsetHeight; // force layout so its cost lands in the measurement (debug only)
  const tEnd = performance.now();
  return { d: tBuild - tDraw, b: tDom - tBuild, dom: tEnd - tDom };
}

function renderFrame(now, metadata) {
  if (metadata) lastPresented = metadata.presentedFrames; // count video frames even on skipped renders, so "drop" stays honest
  if (!video.paused && !video.ended && rows && now - lastRender >= MIN_FRAME_MS) {
    lastRender = now;
    const { d, b, dom } = paint();
    const total = d + b + dom;
    const vt = metadata ? metadata.mediaTime : video.currentTime; // rVFC gives the exact frame time
    const looped = vt < lastVt; // wrapped to start -> decode stall, skip this frame
    lastVt = vt;
    drawMs += d; buildMs += b; domMs += dom;
    if (!looped && (worst.length < WORST_N || total > worst[worst.length - 1].ms)) {
      const record = total > (worst.length ? worst[0].ms : 0); // new all-time worst?
      worst.push({ ms: total, d, b, dom, grid: `${cols}×${rows}`, at: Math.round(now) });
      worst.sort((x, y) => y.ms - x.ms);
      if (worst.length > WORST_N) worst.length = WORST_N;
      if (DEBUG && record) logWorst(); // only on a new #1 (rare); full list is on window.WORST, dumpWorst() anytime
    }
    fpsCount++;
    if (now - fpsLast >= 500) { // always resets the counters; only writes the readout when DEBUG
      const n = fpsCount, secs = (now - fpsLast) / 1000;
      const renderFps = Math.round(n / secs);
      // normalize to the video: rendered fps vs the video's own fps, and frames we couldn't keep up with
      let head = `${renderFps} fps`;
      if (lastPresented) {
        const vFrames = lastPresented - presentedAtWindow;
        const dropped = Math.max(0, vFrames - n);
        head = `${renderFps}/${Math.round(vFrames / secs)} fps · ${dropped} drop`;
        presentedAtWindow = lastPresented;
      }
      const w = worst[0];
      if (DEBUG) fpsEl.textContent = `${head} · ${cols}×${rows} · `
        + `avg d${(drawMs / n).toFixed(1)} b${(buildMs / n).toFixed(1)} dom${(domMs / n).toFixed(1)} · `
        + (w ? `worst ${w.ms.toFixed(0)}ms (d${w.d.toFixed(0)} b${w.b.toFixed(0)} dom${w.dom.toFixed(0)}) ⟳` : "");
      fpsLast = now;
      fpsCount = drawMs = buildMs = domMs = 0;
    }
  }
  scheduleFrame(); // re-register unconditionally so the chain survives skipped/paused frames
}
scheduleFrame();

// Three ways in, all landing on playSrc():
//  • a video FILE (drop / upload) -> a same-origin blob URL. Always samples cleanly, no CORS/IP issues.
//  • a direct VIDEO URL -> used as-is (needs CORS on that host for getImageData; crossorigin is set).
//  • a YOUTUBE link -> /api/resolve turns it into a stream URL. Best-effort: from a cloud host YouTube
//    often bot-blocks the resolver, so file/direct-url are the reliable paths (see CLAUDE.md Deployment).
const MAX_SECONDS = 300; // deny anything longer than 5 minutes (both youtube + dropped files)
function playSrc(src) {
  video.onloadedmetadata = () => {
    if (isFinite(video.duration) && video.duration > MAX_SECONDS) {
      video.pause(); video.removeAttribute("src"); video.load(); // stop + release the source
      document.body.classList.remove("playing");
      return showError("sorry — we only support videos under 5 minutes");
    }
    onMetadata();
  };
  video.src = src;
  video.play().catch(() => {}); // muted autoplay is fine; ignore gesture-required rejections
}

// Show an error centrally and drop out of any loading state so the empty stage returns for a retry.
function showError(msg) { stopLoader(); status.textContent = msg; }

function loadFile(file) {
  if (!file) return;
  // We claim mp4-only. Reject anything else up front (covers both the upload button and drag-drop,
  // since both route through here) rather than half-playing a format we don't promise to support.
  const isMp4 = file.type === "video/mp4" || /\.mp4$/i.test(file.name);
  if (!isMp4) return showError("sorry — we only accept mp4 files");
  status.textContent = "";
  playSrc(URL.createObjectURL(file));
}

// Resolve is a real ~60-100s download on Apify's side, so /api/resolve is non-blocking: it starts a
// run and we poll it. While waiting, an on-theme ascii "scanner" (a bright pulse travelling through the
// char ramp) animates in the centre, over a stage label that steps through the pipeline.
const LOAD_STEPS = [
  "contacting server…", "fetching from youtube…", "downloading video…",
  "preparing stream…", "rendering ascii…",
];
const loaderEl = document.getElementById("loader");
const waveEl = loaderEl.querySelector(".wave");
const msgEl = loaderEl.querySelector(".msg");
let waveTimer = 0, stepTimer = 0;

function startLoader() {
  status.textContent = ""; // clear any prior error
  document.body.classList.add("loading");
  const W = 34; let t = 0, step = 0;
  msgEl.textContent = LOAD_STEPS[0];
  waveTimer = setInterval(() => {           // bright pulse orbits the ramp; wrap-around keeps it seamless
    const center = (t += 0.7) % W;
    let s = "";
    for (let x = 0; x < W; x++) {
      let d = Math.abs(x - center); d = Math.min(d, W - d);
      s += RAMP[Math.max(0, (RAMP.length - 1) - Math.round(d * 1.5))];
    }
    waveEl.textContent = s;
  }, 70);
  stepTimer = setInterval(() => {           // advance the stage label, then hold on the last
    step = Math.min(step + 1, LOAD_STEPS.length - 1);
    msgEl.textContent = LOAD_STEPS[step];
  }, 4000);
}
function stopLoader() {
  document.body.classList.remove("loading");
  clearInterval(waveTimer); clearInterval(stepTimer);
}

// Strip playlist / index / timestamp cruft down to a clean watch URL so we resolve the single video the
// user pasted, not the playlist it lives in. Handles watch?v=, youtu.be/, shorts/, embed/, live/.
// Falls back to the raw string if no 11-char id is found (let the resolver try).
function normalizeYouTube(raw) {
  try {
    const u = new URL(raw.includes("://") ? raw : "https://" + raw);
    let id = u.searchParams.get("v") || "";
    if (!id && u.hostname.includes("youtu.be")) id = u.pathname.slice(1);
    if (!id) { const m = u.pathname.match(/\/(?:shorts|embed|live|v)\/([^/?#]+)/); if (m) id = m[1]; }
    id = id.split(/[/?#&]/)[0];
    return /^[A-Za-z0-9_-]{11}$/.test(id) ? "https://www.youtube.com/watch?v=" + id : raw;
  } catch { return raw; }
}

async function loadYouTube(url) {
  url = normalizeYouTube(url);
  startLoader();
  const fail = (m) => showError("couldn’t load — " + (m || "try another link or upload an mp4"));

  let job;
  try {
    job = await fetch("/api/resolve?url=" + encodeURIComponent(url)).then((r) => r.json());
  } catch (err) { return fail(err.message); }
  if (job.streamUrl) { stopLoader(); status.textContent = ""; return playSrc(job.streamUrl); } // cache hit -> instant
  if (!job.runId) return fail(job.error || "");

  const deadline = Date.now() + 240000; // give up after 4 min
  const poll = async () => {
    if (Date.now() > deadline) return fail("this took too long — try again or upload an mp4");
    let s;
    try {
      s = await fetch("/api/resolve?runId=" + encodeURIComponent(job.runId) +
                      "&datasetId=" + encodeURIComponent(job.datasetId) +
                      "&videoId=" + encodeURIComponent(job.videoId || "")).then((r) => r.json());
    } catch { return setTimeout(poll, 3000); } // transient network blip — keep polling
    if (s.streamUrl) { stopLoader(); status.textContent = ""; return playSrc(s.streamUrl); }
    if (["FAILED", "ABORTED", "TIMED-OUT"].includes(s.status)) return fail(s.error || s.status);
    setTimeout(poll, 3000); // READY / RUNNING — keep waiting
  };
  poll();
}

function loadInput(text) {
  const s = (text || "").trim();
  if (!s) return;
  if (/youtu\.?be/i.test(s)) return loadYouTube(s); // youtube.com / youtu.be
  status.textContent = "";
  playSrc(s); // treat anything else as a direct video URL
}

// Reveal the ASCII, hide the empty state, once frames actually start.
video.addEventListener("playing", () => document.body.classList.add("playing"));
// A source can be rejected (expired / IP-locked / no CORS). Surface it instead of a black screen.
video.addEventListener("error", () => { if (video.src) status.textContent = "this wouldn’t play — try a file or another link"; });

const urlInput = document.getElementById("url");
document.getElementById("load").addEventListener("click", () => loadInput(urlInput.value));
urlInput.addEventListener("keydown", e => { if (e.key === "Enter") loadInput(e.target.value); });
// Own-mp4 path is drag-and-drop only (see the drop handler below) — no upload button by design.

// --- baked embed: record one loop -> .asciiv (shared codec) -> presigned S3 upload -> iframe snippet ---
const embedBtn = document.getElementById("embed");
const embedWrap = document.getElementById("embedwrap");
const embedCode = document.getElementById("embedcode");
const fmt = s => { s = Math.max(0, Math.round(s)); return (s / 60 | 0) + ":" + String(s % 60).padStart(2, "0"); };

async function startBake() {
  if (!video.videoWidth || baking) return;
  baking = true; embedBtn.disabled = true; embedBtn.textContent = "baking…";
  // Record exactly one period from wherever the video is now. It keeps looping, so audio + frames wrap
  // seamlessly and phase doesn't matter (the embed loops too) — this avoids a seek/replay autoplay stall.
  const dur = isFinite(video.duration) && video.duration > 0 ? video.duration : 10;
  let mr = null; const audioChunks = [];
  try {
    const stream = video.captureStream ? video.captureStream() : null;
    const at = stream ? stream.getAudioTracks() : [];
    if (window.MediaRecorder && at.length) {
      mr = new MediaRecorder(new MediaStream(at));
      mr.ondataavailable = e => { if (e.data && e.data.size) audioChunks.push(e.data); };
    }
  } catch { /* captureStream/MediaRecorder unsupported -> silent embed */ }
  recFrames = [];
  try {
    if (video.paused) await video.play();
    if (mr) mr.start();
    recording = true;
    await new Promise(res => {
      const t0 = performance.now();
      const iv = setInterval(() => {
        const el = (performance.now() - t0) / 1000;
        status.textContent = `baking… ${fmt(el)} / ${fmt(dur)}`;
        if (el >= dur) { clearInterval(iv); res(); }
      }, 200);
    });
    recording = false;
    let audioBlob = null;
    if (mr) audioBlob = await new Promise(res => { mr.onstop = () => res(new Blob(audioChunks, { type: mr.mimeType || "audio/webm" })); mr.stop(); });
    await bakeAndUpload(audioBlob, dur);
  } catch (e) {
    showError("couldn’t create embed — " + (e.message || "try again"));
  } finally {
    recording = false;
    if (status.textContent.startsWith("baking")) status.textContent = "";
    baking = false; embedBtn.disabled = false; embedBtn.textContent = "◱ generate embed";
  }
}

async function bakeAndUpload(audioBlob, durSec) {
  if (!recFrames.length) throw new Error("no frames captured");
  status.textContent = "encoding…";
  const audio = audioBlob ? new Uint8Array(await audioBlob.arrayBuffer()) : null;
  const fps = Math.max(1, Math.round(recFrames.length / durSec));
  const header = { fps, cols, rows, colour: state.color, shading: state.shading,
                   durationMs: Math.round(durSec * 1000), audioMime: audioBlob ? (audioBlob.type || "audio/webm") : "" };
  const bytes = await ASCIIV.encodeAsciiv(header, recFrames, audio);
  recFrames = []; // free memory early
  status.textContent = "uploading…";
  const save = await fetch("/api/save", { method: "POST" }).then(r => r.json());
  if (!save || !save.upload) throw new Error((save && save.error) || "save failed");
  const fd = new FormData(); // presigned POST: fields first, file LAST (S3 requires this order)
  Object.entries(save.upload.fields).forEach(([k, v]) => fd.append(k, v));
  fd.append("file", new Blob([bytes], { type: "application/octet-stream" }));
  const up = await fetch(save.upload.url, { method: "POST", body: fd });
  if (!up.ok) throw new Error("upload failed (" + up.status + ")");
  status.textContent = "";
  showSnippet(save.key);
}

function showSnippet(key) {
  const src = location.origin + "/embed.html?id=" + encodeURIComponent(key);
  embedCode.value = `<iframe src="${src}" width="640" height="360" allow="autoplay" style="border:0"></iframe>`;
  embedWrap.hidden = false;
  embedCode.focus(); embedCode.select();
}

embedBtn.addEventListener("click", startBake);
document.getElementById("embedcopy").addEventListener("click", () => {
  embedCode.select();
  if (navigator.clipboard) navigator.clipboard.writeText(embedCode.value);
  const b = document.getElementById("embedcopy"); b.textContent = "copied"; setTimeout(() => (b.textContent = "copy"), 1200);
});
document.getElementById("embedclose").addEventListener("click", () => (embedWrap.hidden = true));

// Drag a video file anywhere onto the page.
let dragDepth = 0; // enter/leave fire per-element; count so the cue doesn't flicker over children
document.addEventListener("dragenter", e => { e.preventDefault(); if (dragDepth++ === 0) document.body.classList.add("dragging"); });
document.addEventListener("dragover", e => e.preventDefault());
document.addEventListener("dragleave", e => { if (--dragDepth <= 0) { dragDepth = 0; document.body.classList.remove("dragging"); } });
document.addEventListener("drop", e => {
  e.preventDefault();
  dragDepth = 0; document.body.classList.remove("dragging");
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

// Warn before closing once something's actually playing — leaving loses the ascii video. Only armed
// while playing (no nag on the empty page). Browsers show their own generic text; the custom string is
// ignored by modern browsers, but setting returnValue is what triggers the confirm prompt.
window.addEventListener("beforeunload", e => {
  if (document.body.classList.contains("playing")) {
    e.preventDefault();
    e.returnValue = "are you sure you wanna close? you’ll lose your ascii video";
  }
});

document.addEventListener("keydown", e => {
  if (document.activeElement === urlInput) return; // never hijack keys while typing a link
  if (e.key === "d") { DEBUG = !DEBUG; fpsEl.style.display = DEBUG ? "block" : "none"; return; } // toggle profiler
  if (e.code === "Space" && video.src) { e.preventDefault(); video.paused ? video.play() : video.pause(); }
});
</script>
</body></html>
